<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Atlas Capture - Application Submitted</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}

body{
  background:#f3f4f6;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:40px 10px;
}

.wrapper{max-width:420px;width:100%}

.header{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin-bottom:18px;
}
.icon{
  display:flex;
  align-items:center;
  justify-content:center;
}
#logoAtlas{
  height: 45px;
  width: 45px;
  border-radius: 40%;
}
.header span{font-weight:600;font-size:18px}

.card{
  background:#fff;
  border-radius:22px;
  padding:32px 24px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  text-align:center;
}

.success-icon{
  width:70px;
  height:70px;
  background:#4CAF50;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 24px;
}
.success-icon svg{
  width:36px;
  height:36px;
  stroke:white;
  stroke-width:2;
}

h2{
  font-size:24px;
  font-weight:700;
  color:#1f2937;
  margin-bottom:12px;
}

.subtext{
  color:#6b7280;
  font-size:14px;
  margin-bottom:20px;
  line-height:1.5;
}

.hours-message{
  background:#fef3c7;
  padding:16px;
  border-radius:16px;
  margin-bottom:24px;
  border:1px solid #fde68a;
}

.hours-message .hours-title{
  font-size:18px;
  font-weight:700;
  color:#d97706;
  margin-bottom:8px;
}

.hours-message .hours-text{
  font-size:13px;
  color:#92400e;
  line-height:1.5;
}

.hours-message .hours-number{
  font-size:28px;
  font-weight:800;
  color:#d97706;
  margin:8px 0;
}

.email-display{
  background:#f3f4f6;
  padding:12px 16px;
  border-radius:12px;
  color:#4f46e5;
  font-weight:500;
  margin-bottom:24px;
  word-break:break-all;
  font-size:14px;
}

button{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:linear-gradient(90deg,#2563eb,#7c3aed);
  color:#fff;
  font-weight:600;
  cursor:pointer;
  transition:all 0.2s;
}
button:hover{
  transform:translateY(-1px);
  box-shadow:0 4px 12px rgba(37,99,235,0.3);
}
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <div class="icon">
      <img id="logoAtlas" src="atlas.png" alt="Atlas logo">
    </div>
    <span>Atlas Capture</span>
  </div>

  <div class="card">
    <div class="success-icon">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M20 6L9 17L4 12" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h2>Application Submitted!</h2>
    <p class="subtext">Your verification request has been received.</p>
    
    <div class="hours-message">
      <div class="hours-title">⏳ Processing Time</div>
      <div class="hours-number">72 Hours</div>
      <div class="hours-text">Your application will be reviewed and resolved within 72 hours. You will receive an email notification once completed.</div>
    </div>
    
    <div class="email-display" id="emailDisplay"></div>
    <button onclick="window.location.href='/users/login'">Return to Home</button>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const email = urlParams.get('email');
  if (email) {
    document.getElementById('emailDisplay').textContent = email;
  }
  
  // If no email, try to get from localStorage or session
  if (!email) {
    const storedEmail = localStorage.getItem('lastEmail');
    if (storedEmail) {
      document.getElementById('emailDisplay').textContent = storedEmail;
    }
  }
</script>

</body>
</html>
