<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Capture - Success</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}

body{
  background:#f3f4f6;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:40px 10px;
}

.wrapper{max-width:420px;width:100%}

.header{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin-bottom:18px;
}
.logo{
  width:34px;height:34px;
  border-radius:8px;
  background:#4f46e5;
}
.header span{font-weight:600;font-size:18px}

.card{
  background:#fff;
  border-radius:22px;
  padding:32px 22px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  text-align:center;
}

.success-icon{
  width:70px;
  height:70px;
  background:#4f46e5;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 24px;
}
.success-icon svg{
  width:36px;
  height:36px;
  stroke:white;
  stroke-width:2;
}

h2{
  font-size:26px;
  font-weight:700;
  color:#1f2937;
  margin-bottom:12px;
}

.subtext{
  color:#6b7280;
  font-size:14px;
  margin-bottom:24px;
  line-height:1.5;
}

.email-display{
  background:#f3f4f6;
  padding:12px 16px;
  border-radius:12px;
  color:#4f46e5;
  font-weight:500;
  margin-bottom:24px;
  word-break:break-all;
  font-size:14px;
}

button{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:linear-gradient(90deg,#2563eb,#7c3aed);
  color:#fff;
  font-weight:600;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <div class="logo"></div>
    <span>Atlas Capture</span>
  </div>

  <div class="card">
    <div class="success-icon">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M20 6L9 17L4 12" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h2>Verification Complete!</h2>
    <p class="subtext">Your account has been successfully verified. You're now ready to start contributing.</p>
    <div class="email-display" id="emailDisplay"></div>
    <button onclick="window.location.href='/users/login'">Continue</button>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const email = urlParams.get('email');
  if (email) {
    document.getElementById('emailDisplay').textContent = email;
  }
</script>

</body>
</html>
